<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JMD Cement Material Product Company</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>🏗️ JMD CEMENT MATERIAL PRODUCT COMPANY</h1>
  </div>

  <!-- CUSTOMER -->
  <div class="card">
    <h2>Customer Details</h2>

    <div class="grid">
      <input id="customerName" placeholder="Customer Name">
      <input id="customerPhone" placeholder="Phone">
      <input id="customerAddress" placeholder="Address">
    </div>
  </div>

  <!-- PRODUCT -->
  <div class="card">
    <h2>Product Details</h2>

    <div class="grid">
      <input id="productName" placeholder="Product Name">
      <input id="productQty" type="number" placeholder="Quantity">
      <input id="productRate" type="number" placeholder="Rate">
    </div>

    <button onclick="addProduct()">➕ Add Product</button>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h2>Product List</h2>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>Rate</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="productList"></tbody>
    </table>
  </div>

  <!-- BILL -->
  <div class="card">
    <h2>Bill Summary</h2>

    <p>Subtotal: ₹<span id="subtotal">0</span></p>
    <p>GST (18%): ₹<span id="gst">0</span></p>
    <h3>Total: ₹<span id="total">0</span></h3>

    <button onclick="generateInvoice()">📄 Generate Invoice</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h2>Invoice History</h2>
    <ul id="history"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
